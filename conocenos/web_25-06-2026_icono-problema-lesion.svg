<svg xmlns="http://www.w3.org/2000/svg" xml:space="preserve" viewBox="0 0 64 64" role="img">
  <title>Alerta de lesión con cruz médica</title>
  <defs>
    <style>
      .les-fondo     { fill: #1E293B; }
      .les-triangulo { fill: #EF4444; }
      .les-excl      { fill: #1E293B; }
      .les-cruz      { fill: #F8FAFC; }
    </style>
  </defs>

  <!-- Fondo -->
  <rect width="64" height="64" rx="14" class="les-fondo"/>

  <!-- Triángulo de alerta -->
  <path d="M32 10 L56 50 H8 Z" class="les-triangulo"/>

  <!-- Exclamación — barra -->
  <rect x="30" y="24" width="4" height="14" rx="2" class="les-excl"/>
  <!-- Exclamación — punto -->
  <circle cx="32" cy="43" r="2.2" class="les-excl"/>

  <!-- Cruz médica superpuesta (zona inferior-derecha interior del triángulo) -->
  <rect x="37" y="40" width="14" height="5" rx="2" class="les-cruz"/>
  <rect x="41.5" y="35.5" width="5" height="14" rx="2" class="les-cruz"/>
</svg>
