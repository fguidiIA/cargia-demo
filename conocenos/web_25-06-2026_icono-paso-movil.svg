<svg xmlns="http://www.w3.org/2000/svg" xml:space="preserve" viewBox="0 0 64 64" role="img">
  <title>Móvil mostrando RPE 7</title>
  <defs>
    <style>
      .mov-fondo    { fill: #1E293B; }
      .mov-cuerpo   { fill: #334155; stroke: #F8FAFC; stroke-width: 2; }
      .mov-pantalla { fill: #0F172A; }
      .mov-notch    { fill: #1E293B; }
      .mov-numero   { font-family: Inter, sans-serif; font-size: 26px; font-weight: 700;
                      fill: #10B981; text-anchor: middle; dominant-baseline: central; }
    </style>
  </defs>

  <!-- Fondo -->
  <rect width="64" height="64" rx="14" class="mov-fondo"/>

  <!-- Cuerpo del móvil -->
  <rect x="16" y="8" width="32" height="48" rx="5" class="mov-cuerpo"/>

  <!-- Pantalla -->
  <rect x="19" y="16" width="26" height="34" rx="2" class="mov-pantalla"/>

  <!-- Notch (cámara) -->
  <rect x="27" y="11" width="10" height="3" rx="1.5" class="mov-notch"/>

  <!-- Número 7 — única excepción de <text> permitida -->
  <text x="32" y="34" class="mov-numero">7</text>
</svg>
