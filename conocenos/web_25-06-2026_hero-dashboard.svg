<svg xmlns="http://www.w3.org/2000/svg" xml:space="preserve" viewBox="0 0 800 500" role="img" aria-labelledby="hero-title">
  <title id="hero-title">Panel de CargIA mostrando gráfico ACWR, valor RPE y bienestar del deportista</title>
  <defs>
    <style>
      .hero-bg        { fill: #0F172A; }
      .hero-card      { fill: #1E293B; }
      .hero-card-alt  { fill: #162032; }
      .hero-primario  { fill: #1E40AF; }
      .hero-acento    { fill: #10B981; }
      .hero-texto     { fill: #F8FAFC; font-family: Inter, sans-serif; }
      .hero-secundario{ fill: #94A3B8; font-family: Inter, sans-serif; }
      .hero-border    { fill: none; stroke: #1E40AF; stroke-width: 1; opacity: 0.4; }
      .hero-naranja   { fill: #F59E0B; }
      .hero-rojo      { fill: #EF4444; }
      .hero-azul-claro{ fill: #3B82F6; }
    </style>
    <linearGradient id="hero-grad-bar1" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1E40AF"/>
      <stop offset="100%" stop-color="#1E40AF" stop-opacity="0.5"/>
    </linearGradient>
    <linearGradient id="hero-grad-bar2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#10B981"/>
      <stop offset="100%" stop-color="#10B981" stop-opacity="0.5"/>
    </linearGradient>
    <linearGradient id="hero-grad-rpe" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1E40AF"/>
      <stop offset="100%" stop-color="#10B981"/>
    </linearGradient>
    <linearGradient id="hero-grad-ring" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#10B981"/>
      <stop offset="100%" stop-color="#3B82F6"/>
    </linearGradient>
    <clipPath id="hero-clip-main">
      <rect x="0" y="0" width="800" height="500" rx="0"/>
    </clipPath>
    <!-- Glow sutil detrás del RPE -->
    <radialGradient id="hero-glow-rpe" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#1E40AF" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#1E40AF" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="hero-glow-well" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#10B981" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#10B981" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Fondo principal -->
  <rect width="800" height="500" class="hero-bg"/>

  <!-- Grid decorativo sutil -->
  <g opacity="0.06" stroke="#94A3B8" stroke-width="0.5" fill="none">
    <line x1="0" y1="80"  x2="800" y2="80"/>
    <line x1="0" y1="160" x2="800" y2="160"/>
    <line x1="0" y1="240" x2="800" y2="240"/>
    <line x1="0" y1="320" x2="800" y2="320"/>
    <line x1="0" y1="400" x2="800" y2="400"/>
    <line x1="80"  y1="0" x2="80"  y2="500"/>
    <line x1="160" y1="0" x2="160" y2="500"/>
    <line x1="240" y1="0" x2="240" y2="500"/>
    <line x1="320" y1="0" x2="320" y2="500"/>
    <line x1="400" y1="0" x2="400" y2="500"/>
    <line x1="480" y1="0" x2="480" y2="500"/>
    <line x1="560" y1="0" x2="560" y2="500"/>
    <line x1="640" y1="0" x2="640" y2="500"/>
    <line x1="720" y1="0" x2="720" y2="500"/>
  </g>

  <!-- ===== TOPBAR ===== -->
  <rect x="0" y="0" width="800" height="52" fill="#0F172A"/>
  <rect x="0" y="51" width="800" height="1" fill="#1E40AF" opacity="0.3"/>
  <!-- Logo marca -->
  <rect x="24" y="14" width="28" height="24" rx="5" fill="#1E40AF"/>
  <text x="38" y="30" font-family="Inter, sans-serif" font-size="11" font-weight="700" fill="#F8FAFC" text-anchor="middle">CA</text>
  <text x="62" y="31" font-family="Inter, sans-serif" font-size="13" font-weight="700" fill="#F8FAFC">CargIA</text>
  <!-- Nav pills -->
  <rect x="200" y="16" width="70" height="20" rx="10" fill="#1E40AF" opacity="0.9"/>
  <text x="235" y="30" font-family="Inter, sans-serif" font-size="10" fill="#F8FAFC" text-anchor="middle">Carga</text>
  <text x="295" y="31" font-family="Inter, sans-serif" font-size="10" fill="#94A3B8" text-anchor="middle">Bienestar</text>
  <text x="360" y="31" font-family="Inter, sans-serif" font-size="10" fill="#94A3B8" text-anchor="middle">Lesiones</text>
  <!-- Avatar -->
  <circle cx="762" cy="26" r="14" fill="#1E293B"/>
  <circle cx="762" cy="22" r="6" fill="#94A3B8"/>
  <ellipse cx="762" cy="36" rx="10" ry="6" fill="#94A3B8"/>

  <!-- ===== CARD GRANDE: Gráfico ACWR ===== -->
  <rect x="24" y="68" width="440" height="280" rx="12" class="hero-card"/>
  <rect x="24" y="68" width="440" height="280" rx="12" class="hero-border" stroke="#1E40AF" stroke-width="1" opacity="0.3"/>

  <!-- Título card -->
  <text x="44" y="92" font-family="Inter, sans-serif" font-size="12" font-weight="600" fill="#94A3B8">ACWR — Carga aguda:crónica</text>
  <!-- Badge equipo -->
  <rect x="370" y="78" width="78" height="18" rx="9" fill="#1E40AF" opacity="0.25"/>
  <text x="409" y="90" font-family="Inter, sans-serif" font-size="10" fill="#3B82F6" text-anchor="middle">Equipo A</text>

  <!-- Banda verde óptima (0.8 – 1.3) -->
  <rect x="48" y="116" width="396" height="56" rx="4" fill="#10B981" opacity="0.08"/>
  <text x="448" y="130" font-family="Inter, sans-serif" font-size="9" fill="#10B981" text-anchor="end" opacity="0.7">1.3 óptimo</text>
  <text x="448" y="175" font-family="Inter, sans-serif" font-size="9" fill="#10B981" text-anchor="end" opacity="0.7">0.8</text>
  <!-- Línea referencia 1.0 -->
  <line x1="48" y1="144" x2="444" y2="144" stroke="#10B981" stroke-width="1" stroke-dasharray="4 3" opacity="0.4"/>

  <!-- Eje Y labels -->
  <text x="45" y="119" font-family="Inter, sans-serif" font-size="9" fill="#94A3B8" text-anchor="end">1.6</text>
  <text x="45" y="144" font-family="Inter, sans-serif" font-size="9" fill="#94A3B8" text-anchor="end">1.0</text>
  <text x="45" y="175" font-family="Inter, sans-serif" font-size="9" fill="#94A3B8" text-anchor="end">0.8</text>
  <text x="45" y="225" font-family="Inter, sans-serif" font-size="9" fill="#94A3B8" text-anchor="end">0.0</text>

  <!-- Eje X línea base -->
  <line x1="48" y1="228" x2="444" y2="228" stroke="#1E40AF" stroke-width="1" opacity="0.3"/>

  <!-- Barras ACWR (10 deportistas simulados) -->
  <!-- Escala: 0→228, 1.6→116 → 1 unidad = 70px, base en 228 -->
  <!-- Deportista 1: ACWR 0.7 → altura=49, y=179 (azul bajo) -->
  <rect x="55"  y="179" width="30" height="49" rx="3" fill="#3B82F6" opacity="0.8"/>
  <!-- Deportista 2: ACWR 1.05 → altura=74, y=154 (verde) -->
  <rect x="95"  y="154" width="30" height="74" rx="3" fill="url(#hero-grad-bar2)" opacity="0.9"/>
  <!-- Deportista 3: ACWR 1.2 → altura=84, y=144 (verde) -->
  <rect x="135" y="140" width="30" height="88" rx="3" fill="url(#hero-grad-bar2)" opacity="0.9"/>
  <!-- Deportista 4: ACWR 1.45 → altura=102, y=126 (naranja) -->
  <rect x="175" y="122" width="30" height="106" rx="3" fill="#F59E0B" opacity="0.85"/>
  <!-- Deportista 5: ACWR 1.1 → altura=77, y=151 (verde) -->
  <rect x="215" y="151" width="30" height="77" rx="3" fill="url(#hero-grad-bar2)" opacity="0.9"/>
  <!-- Deportista 6: ACWR 0.9 → altura=63, y=165 (verde) -->
  <rect x="255" y="165" width="30" height="63" rx="3" fill="url(#hero-grad-bar2)" opacity="0.9"/>
  <!-- Deportista 7: ACWR 1.7 → altura=119, y=109 (rojo) -->
  <rect x="295" y="109" width="30" height="119" rx="3" fill="#EF4444" opacity="0.85"/>
  <!-- Deportista 8: ACWR 1.25 → altura=88, y=140 (verde) -->
  <rect x="335" y="140" width="30" height="88" rx="3" fill="url(#hero-grad-bar2)" opacity="0.9"/>
  <!-- Deportista 9: ACWR 0.85 → altura=60, y=168 (verde) -->
  <rect x="375" y="168" width="30" height="60" rx="3" fill="url(#hero-grad-bar2)" opacity="0.9"/>
  <!-- Deportista 10: ACWR 1.35 → altura=95, y=133 (naranja) -->
  <rect x="415" y="133" width="30" height="95" rx="3" fill="#F59E0B" opacity="0.85"/>

  <!-- Línea de tendencia sobre barras -->
  <polyline points="70,186 110,157 150,143 190,125 230,154 270,168 310,112 350,143 390,171 430,136"
    fill="none" stroke="#F8FAFC" stroke-width="2" stroke-linejoin="round" opacity="0.5"/>
  <!-- Puntos en línea -->
  <circle cx="70"  cy="186" r="3" fill="#F8FAFC" opacity="0.7"/>
  <circle cx="110" cy="157" r="3" fill="#F8FAFC" opacity="0.7"/>
  <circle cx="150" cy="143" r="3" fill="#F8FAFC" opacity="0.7"/>
  <circle cx="190" cy="125" r="3" fill="#F59E0B"/>
  <circle cx="230" cy="154" r="3" fill="#F8FAFC" opacity="0.7"/>
  <circle cx="270" cy="168" r="3" fill="#F8FAFC" opacity="0.7"/>
  <circle cx="310" cy="112" r="5" fill="#EF4444"/>
  <circle cx="350" cy="143" r="3" fill="#F8FAFC" opacity="0.7"/>
  <circle cx="390" cy="171" r="3" fill="#F8FAFC" opacity="0.7"/>
  <circle cx="430" cy="136" r="3" fill="#F59E0B"/>

  <!-- Etiquetas eje X (nombres cortos) -->
  <text x="70"  y="241" font-family="Inter, sans-serif" font-size="8.5" fill="#94A3B8" text-anchor="middle">MRC</text>
  <text x="110" y="241" font-family="Inter, sans-serif" font-size="8.5" fill="#94A3B8" text-anchor="middle">LUC</text>
  <text x="150" y="241" font-family="Inter, sans-serif" font-size="8.5" fill="#94A3B8" text-anchor="middle">DIE</text>
  <text x="190" y="241" font-family="Inter, sans-serif" font-size="8.5" fill="#F59E0B" text-anchor="middle">SAR</text>
  <text x="230" y="241" font-family="Inter, sans-serif" font-size="8.5" fill="#94A3B8" text-anchor="middle">JAV</text>
  <text x="270" y="241" font-family="Inter, sans-serif" font-size="8.5" fill="#94A3B8" text-anchor="middle">ANA</text>
  <text x="310" y="241" font-family="Inter, sans-serif" font-size="8.5" fill="#EF4444" text-anchor="middle">ROB</text>
  <text x="350" y="241" font-family="Inter, sans-serif" font-size="8.5" fill="#94A3B8" text-anchor="middle">PAB</text>
  <text x="390" y="241" font-family="Inter, sans-serif" font-size="8.5" fill="#94A3B8" text-anchor="middle">IRE</text>
  <text x="430" y="241" font-family="Inter, sans-serif" font-size="8.5" fill="#F59E0B" text-anchor="middle">TOM</text>

  <!-- Leyenda bandas -->
  <rect x="48"  y="258" width="10" height="10" rx="2" fill="#3B82F6"/>
  <text x="63"  y="267" font-family="Inter, sans-serif" font-size="9" fill="#94A3B8">&lt;0.8 Bajo</text>
  <rect x="118" y="258" width="10" height="10" rx="2" fill="#10B981"/>
  <text x="133" y="267" font-family="Inter, sans-serif" font-size="9" fill="#94A3B8">Óptimo</text>
  <rect x="185" y="258" width="10" height="10" rx="2" fill="#F59E0B"/>
  <text x="200" y="267" font-family="Inter, sans-serif" font-size="9" fill="#94A3B8">Elevado</text>
  <rect x="255" y="258" width="10" height="10" rx="2" fill="#EF4444"/>
  <text x="270" y="267" font-family="Inter, sans-serif" font-size="9" fill="#94A3B8">Alto riesgo</text>

  <!-- ===== CARD RPE ===== -->
  <rect x="480" y="68" width="148" height="148" rx="12" class="hero-card"/>
  <rect x="480" y="68" width="148" height="148" rx="12" fill="none" stroke="#1E40AF" stroke-width="1" opacity="0.3"/>
  <!-- Glow RPE -->
  <ellipse cx="554" cy="148" rx="60" ry="55" fill="url(#hero-glow-rpe)"/>
  <text x="554" y="96" font-family="Inter, sans-serif" font-size="11" font-weight="600" fill="#94A3B8" text-anchor="middle">RPE medio hoy</text>
  <!-- Número grande -->
  <text x="554" y="160" font-family="Inter, sans-serif" font-size="64" font-weight="800" fill="#F8FAFC" text-anchor="middle" dominant-baseline="auto">7</text>
  <text x="554" y="176" font-family="Inter, sans-serif" font-size="11" fill="#94A3B8" text-anchor="middle">de 10</text>
  <!-- Barra indicadora RPE -->
  <rect x="498" y="190" width="112" height="7" rx="3.5" fill="#1E293B"/>
  <rect x="498" y="190" width="78" height="7" rx="3.5" fill="url(#hero-grad-rpe)"/>
  <text x="498" y="207" font-family="Inter, sans-serif" font-size="9" fill="#94A3B8">0</text>
  <text x="606" y="207" font-family="Inter, sans-serif" font-size="9" fill="#94A3B8" text-anchor="end">10</text>

  <!-- ===== CARD Bienestar (anillo/gauge) ===== -->
  <rect x="640" y="68" width="136" height="148" rx="12" class="hero-card"/>
  <rect x="640" y="68" width="136" height="148" rx="12" fill="none" stroke="#10B981" stroke-width="1" opacity="0.3"/>
  <!-- Glow bienestar -->
  <ellipse cx="708" cy="148" rx="50" ry="50" fill="url(#hero-glow-well)"/>
  <text x="708" y="96" font-family="Inter, sans-serif" font-size="11" font-weight="600" fill="#94A3B8" text-anchor="middle">Bienestar</text>

  <!-- Anillo gauge (círculo progreso) -->
  <!-- Círculo fondo -->
  <circle cx="708" cy="148" r="40" fill="none" stroke="#1E293B" stroke-width="8"/>
  <!-- Progreso: 78% = 0.78 * 2π*40 ≈ 196. circumference=251.3. dashoffset=251.3*(1-0.78)=55.3 -->
  <circle cx="708" cy="148" r="40" fill="none" stroke="url(#hero-grad-ring)" stroke-width="8"
    stroke-linecap="round"
    stroke-dasharray="251.3"
    stroke-dashoffset="55.3"
    transform="rotate(-90 708 148)"/>
  <!-- Valor central -->
  <text x="708" y="144" font-family="Inter, sans-serif" font-size="22" font-weight="800" fill="#F8FAFC" text-anchor="middle">78</text>
  <text x="708" y="160" font-family="Inter, sans-serif" font-size="10" fill="#10B981" text-anchor="middle">BUENO</text>

  <!-- Número debajo -->
  <text x="708" y="200" font-family="Inter, sans-serif" font-size="10" fill="#94A3B8" text-anchor="middle">19.5 / 25 pts</text>

  <!-- ===== CARD métricas carga semana ===== -->
  <rect x="480" y="228" width="296" height="120" rx="12" class="hero-card"/>
  <rect x="480" y="228" width="296" height="120" rx="12" fill="none" stroke="#1E40AF" stroke-width="1" opacity="0.2"/>
  <text x="500" y="250" font-family="Inter, sans-serif" font-size="11" font-weight="600" fill="#94A3B8">Métricas de carga — semana actual</text>

  <!-- Métricas 3 columnas -->
  <!-- Carga aguda -->
  <text x="534" y="285" font-family="Inter, sans-serif" font-size="11" fill="#94A3B8" text-anchor="middle">Aguda 7d</text>
  <text x="534" y="308" font-family="Inter, sans-serif" font-size="24" font-weight="700" fill="#3B82F6" text-anchor="middle">342</text>
  <text x="534" y="324" font-family="Inter, sans-serif" font-size="10" fill="#94A3B8" text-anchor="middle">UA</text>
  <!-- Separador -->
  <line x1="608" y1="268" x2="608" y2="338" stroke="#1E40AF" stroke-width="1" opacity="0.25"/>
  <!-- Carga crónica -->
  <text x="648" y="285" font-family="Inter, sans-serif" font-size="11" fill="#94A3B8" text-anchor="middle">Crónica 28d</text>
  <text x="648" y="308" font-family="Inter, sans-serif" font-size="24" font-weight="700" fill="#10B981" text-anchor="middle">318</text>
  <text x="648" y="324" font-family="Inter, sans-serif" font-size="10" fill="#94A3B8" text-anchor="middle">UA / sem</text>
  <!-- Separador -->
  <line x1="722" y1="268" x2="722" y2="338" stroke="#1E40AF" stroke-width="1" opacity="0.25"/>
  <!-- ACWR -->
  <text x="756" y="285" font-family="Inter, sans-serif" font-size="11" fill="#94A3B8" text-anchor="middle">ACWR</text>
  <text x="756" y="308" font-family="Inter, sans-serif" font-size="24" font-weight="700" fill="#10B981" text-anchor="middle">1.08</text>
  <rect x="728" y="328" width="56" height="14" rx="7" fill="#10B981" opacity="0.2"/>
  <text x="756" y="338" font-family="Inter, sans-serif" font-size="9" fill="#10B981" text-anchor="middle">OPTIMO</text>

  <!-- ===== CARD estado deportistas (lista mini) ===== -->
  <rect x="24" y="364" width="440" height="116" rx="12" class="hero-card"/>
  <rect x="24" y="364" width="440" height="116" rx="12" fill="none" stroke="#1E40AF" stroke-width="1" opacity="0.2"/>
  <text x="44" y="385" font-family="Inter, sans-serif" font-size="11" font-weight="600" fill="#94A3B8">Estado del equipo</text>
  <!-- Fila cabecera -->
  <text x="64"  y="402" font-family="Inter, sans-serif" font-size="9" fill="#94A3B8">Deportista</text>
  <text x="198" y="402" font-family="Inter, sans-serif" font-size="9" fill="#94A3B8" text-anchor="middle">Carga</text>
  <text x="278" y="402" font-family="Inter, sans-serif" font-size="9" fill="#94A3B8" text-anchor="middle">ACWR</text>
  <text x="358" y="402" font-family="Inter, sans-serif" font-size="9" fill="#94A3B8" text-anchor="middle">Bienestar</text>
  <text x="432" y="402" font-family="Inter, sans-serif" font-size="9" fill="#94A3B8" text-anchor="middle">RPE</text>
  <line x1="44" y1="406" x2="450" y2="406" stroke="#1E40AF" stroke-width="1" opacity="0.2"/>

  <!-- Fila 1: Marcos -->
  <circle cx="52" cy="420" r="6" fill="#1E40AF"/>
  <text x="52" y="424" font-family="Inter, sans-serif" font-size="7" fill="#F8FAFC" text-anchor="middle">M</text>
  <text x="64"  y="424" font-family="Inter, sans-serif" font-size="10" fill="#F8FAFC">Marcos R.</text>
  <text x="198" y="424" font-family="Inter, sans-serif" font-size="10" fill="#F8FAFC" text-anchor="middle">380 UA</text>
  <rect x="256" y="415" width="44" height="14" rx="7" fill="#F59E0B" opacity="0.2"/>
  <text x="278" y="424" font-family="Inter, sans-serif" font-size="10" fill="#F59E0B" text-anchor="middle">1.45</text>
  <text x="358" y="424" font-family="Inter, sans-serif" font-size="10" fill="#10B981" text-anchor="middle">18 pts</text>
  <text x="432" y="424" font-family="Inter, sans-serif" font-size="10" fill="#F8FAFC" text-anchor="middle">7</text>

  <!-- Fila 2: Roberto -->
  <circle cx="52" cy="442" r="6" fill="#EF4444" opacity="0.8"/>
  <text x="52" y="446" font-family="Inter, sans-serif" font-size="7" fill="#F8FAFC" text-anchor="middle">R</text>
  <text x="64"  y="446" font-family="Inter, sans-serif" font-size="10" fill="#F8FAFC">Roberto K.</text>
  <text x="198" y="446" font-family="Inter, sans-serif" font-size="10" fill="#F8FAFC" text-anchor="middle">412 UA</text>
  <rect x="256" y="437" width="44" height="14" rx="7" fill="#EF4444" opacity="0.2"/>
  <text x="278" y="446" font-family="Inter, sans-serif" font-size="10" fill="#EF4444" text-anchor="middle">1.70</text>
  <text x="358" y="446" font-family="Inter, sans-serif" font-size="10" fill="#F59E0B" text-anchor="middle">14 pts</text>
  <text x="432" y="446" font-family="Inter, sans-serif" font-size="10" fill="#F8FAFC" text-anchor="middle">8</text>

  <!-- Fila 3: Lucía -->
  <circle cx="52" cy="464" r="6" fill="#10B981" opacity="0.8"/>
  <text x="52" y="468" font-family="Inter, sans-serif" font-size="7" fill="#F8FAFC" text-anchor="middle">L</text>
  <text x="64"  y="468" font-family="Inter, sans-serif" font-size="10" fill="#F8FAFC">Lucía M.</text>
  <text x="198" y="468" font-family="Inter, sans-serif" font-size="10" fill="#F8FAFC" text-anchor="middle">295 UA</text>
  <rect x="256" y="459" width="44" height="14" rx="7" fill="#10B981" opacity="0.2"/>
  <text x="278" y="468" font-family="Inter, sans-serif" font-size="10" fill="#10B981" text-anchor="middle">1.05</text>
  <text x="358" y="468" font-family="Inter, sans-serif" font-size="10" fill="#10B981" text-anchor="middle">21 pts</text>
  <text x="432" y="468" font-family="Inter, sans-serif" font-size="10" fill="#F8FAFC" text-anchor="middle">6</text>

  <!-- Fecha esquina inferior derecha -->
  <text x="776" y="488" font-family="Inter, sans-serif" font-size="9" fill="#94A3B8" text-anchor="end" opacity="0.5">25 jun 2026</text>
</svg>
