<svg xmlns="http://www.w3.org/2000/svg" xml:space="preserve" viewBox="0 0 64 64" role="img">
  <title>Silueta de deportista con interrogante</title>
  <defs>
    <style>
      .dep-fondo    { fill: #1E293B; }
      .dep-silueta  { fill: #94A3B8; }
      .dep-q        { fill: none; stroke: #F8FAFC; stroke-width: 2.5; stroke-linecap: round; }
      .dep-qdot     { fill: #F8FAFC; }
    </style>
  </defs>

  <!-- Fondo -->
  <rect width="64" height="64" rx="14" class="dep-fondo"/>

  <!-- Cabeza (círculo) -->
  <circle cx="24" cy="18" r="7" class="dep-silueta"/>

  <!-- Cuerpo (trapecio: hombros anchos, base algo más estrecha) -->
  <path d="M12 52 Q12 36 17 33 L24 31 L31 33 Q36 36 36 52 Z" class="dep-silueta"/>

  <!-- Signo "?" — arco superior -->
  <path d="M42 21 Q42 16 47 16 Q52 16 52 21 Q52 25 47 27 L47 31" class="dep-q"/>
  <!-- Punto del "?" -->
  <circle cx="47" cy="35" r="1.8" class="dep-qdot"/>
</svg>
