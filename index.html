/* ---------------- Helpers ---------------- */
const fmtDate = (ds, lang) => {
  const d = new Date(ds + "T00:00:00");
  return d.toLocaleDateString(lang==="es"?"es-ES":"en-GB", { day:"2-digit", month:"short" });
};
function acwrColor(v, hasData) {
  if (!hasData || v===0) return C.gray;
  if (v<0.8) return C.blue;
  if (v<=1.3) return C.green;
  if (v<=1.6) return C.orange;
  return C.red;
}
function bandIndex(v, hasData){ if(!hasData||v===0) return 4; if(v<0.8) return 0; if(v<=1.3) return 1; if(v<=1.6) return 2; return 3; }

function wellnessColor(score){ if(score==null) return C.gray; if(score>=20) return C.green; if(score>=14) return C.orange; return C.red; }
function latestWellnessByAthlete(rows){ const m={}; for(const w of rows){ if(!m[w.athlete_id]) m[w.athlete_id]=w; } return m; }
const INJURY_STATUS = ["active","in_treatment","monitoring","recovered"];
function injuryColor(s){ return s==="active"?C.red : s==="in_treatment"?C.orange : s==="monitoring"?C.blue : C.green; }
function injuryStatusLabel(t,s){ return ({active:t.st_active,in_treatment:t.st_in_treatment,monitoring:t.st_monitoring,recovered:t.st_recovered})[s]||s; }

/* ---------------- App ---------------- */
function App() {
  const [lang, setLang] = useState("es");
  const [session, setSession] = useState(undefined); // undefined = comprobando
  const [profile, setProfile] = useState(null);

  useEffect(() => {
    db.auth.getSession().then(({data}) => setSession(data.session));
    const { data: sub } = db.auth.onAuthStateChange((_e, s) => setSession(s));
    return () => sub.subscription.unsubscribe();
  }, []);

  useEffect(() => {
    let cancel = false;
    if (session && session.user) {
      db.from("profiles").select("*").eq("id", session.user.id).single()
        .then(({data}) => { if(!cancel){ setProfile(data); if(data && data.locale) setLang(data.locale); } });
    } else { setProfile(null); }
    return () => { cancel = true; };
  }, [session]);

  const t = I18N[lang];
  const LangToggle = () => (
    <div style={{display:"inline-flex", background:C.panel2, borderRadius:10, padding:3}}>
      {["es","en"].map(l=>(
        <button key={l} onClick={()=>setLang(l)}
          style={btn(lang===l?C.brand:"transparent",{padding:"5px 12px", fontSize:13, color:lang===l?"#fff":C.sub})}>
          {l.toUpperCase()}
        </button>
      ))}
    </div>
  );

  const shell = { background:C.bg, color:C.text, minHeight:"100vh", maxWidth:1000, margin:"0 auto" };

  let content;
  if (session === undefined) content = <Splash t={t}/>;
  else if (!session) content = <Login t={t} LangToggle={LangToggle} />;
  else if (!profile) content = <Splash t={t}/>;
  else if (profile.role === "coach")
    content = <CoachApp t={t} lang={lang} LangToggle={LangToggle} profile={profile} />;
  else
    content = <AthleteApp t={t} lang={lang} LangToggle={LangToggle} profile={profile} />;

  return <div style={shell}>{content}</div>;
}

/* ---------------- Login ---------------- */
function Login({t, LangToggle}) {
  const [email, setEmail] = useState("");
  const [password, setPassword] = useState("");
  const [busy, setBusy] = useState(false);
  const [err, setErr] = useState("");

  async function signIn(e, p) {
    setBusy(true); setErr("");
    const { error } = await db.auth.signInWithPassword({ email: e, password: p });
    if (error) { setErr(t.login_error); setBusy(false); }
  }

  return (
    <div style={{padding:"48px 28px", textAlign:"center"}}>
      <div style={{display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:48}}>
        <div style={{display:"flex", alignItems:"center", gap:10}}><Mark/><Brand fontSize={22}/></div>
        <LangToggle/>
      </div>
      <div style={{display:"flex", justifyContent:"center", marginBottom:14}}><Mark size={64}/></div>
      <h1 style={{margin:"0 0 8px"}}><Brand fontSize={34}/></h1>
      <p style={{color:C.sub, marginBottom:32}}>{t.tagline}</p>

      <div style={{maxWidth:380, margin:"0 auto", textAlign:"left"}}>
        <Field label={t.email_label} value={email} onChange={setEmail} type="email"/>
        <Field label={t.password_label} value={password} onChange={setPassword} type="password"/>
        {err && <div style={{color:C.red, fontSize:13, marginBottom:12}}>{err}</div>}
        <button disabled={busy} onClick={()=>signIn(email,password)}
          style={btn(C.brand,{width:"100%", marginBottom:12, opacity:busy?0.7:1})}>
          {busy ? t.signing_in : t.enter}
        </button>
        <button disabled={busy} onClick={()=>signIn(DEMO.email, DEMO.password)}
          style={btn(C.panel2,{width:"100%", color:C.text, border:`1px solid ${C.line}`})}>
          {t.demo_mode}
        </button>
        <p style={{color:C.gray, fontSize:12, marginTop:18, textAlign:"center"}}>
          Demo: coach@demo.es · lucia@demo.es — Demo1234!
        </p>
      </div>
    </div>
  );
}

/* ---------------- TopBar ---------------- */
function TopBar({t, LangToggle, tabs, tab, setTab}) {
  return (
    <div style={{borderBottom:`1px solid ${C.line}`, position:"sticky", top:0, background:C.bg, zIndex:5}}>
      <div style={{display:"flex", justifyContent:"space-between", alignItems:"center", padding:"16px 22px"}}>
        <div style={{display:"flex", alignItems:"center", gap:10}}><Mark size={28}/><Brand/></div>
        <div style={{display:"flex", alignItems:"center", gap:12}}>
          <LangToggle/>
          <button onClick={()=>db.auth.signOut()} style={btn(C.panel2,{padding:"8px 14px", fontSize:13, color:C.sub})}>{t.logout}</button>
        </div>
      </div>
      {tabs && (
        <div style={{display:"flex", gap:6, padding:"0 22px 14px", overflowX:"auto"}}>
          {tabs.map(([key,label])=>(
            <button key={key} onClick={()=>setTab(key)}
              style={btn(tab===key?C.brand:"transparent",{padding:"8px 16px", fontSize:14, color:tab===key?"#fff":C.sub, whiteSpace:"nowrap"})}>
              {label}
            </button>
          ))}
        </div>
      )}
    </div>
  );
}

/* ---------------- Coach ---------------- */
function CoachApp({t, lang, LangToggle, profile}) {
  const [tab, setTab] = useState("results");
  const [athletes, setAthletes] = useState([]);
  const [teams, setTeams] = useState([]);
  const [sessions, setSessions] = useState([]);
  const [acwr, setAcwr] = useState([]);
  const [wellness, setWellness] = useState([]);
  const [injuries, setInjuries] = useState([]);
  const [loading, setLoading] = useState(true);

  async function loadAll() {
    const [a, tm, s, w, well, inj] = await Promise.all([
      db.from("profiles").select("id,full_name,email,username,acwr_visible").eq("coach_id", profile.id).eq("role","athlete").order("full_name"),
      db.from("teams").select("id,name,team_members(athlete_id)").eq("coach_id", profile.id).order("name"),
      db.from("sessions").select("id,team_id,session_date,session_athletes(id,athlete_id,minutes,rpe,submitted_at)").order("session_date",{ascending:false}),
      db.from("v_athlete_acwr").select("*"),
      db.from("wellness_entries").select("*").order("entry_date",{ascending:false}),
      db.from("injuries").select("*").order("onset_date",{ascending:false}),
    ]);
    setAthletes(a.data||[]);
    setTeams((tm.data||[]).map(x=>({ id:x.id, name:x.name, memberIds:(x.team_members||[]).map(m=>m.athlete_id) })));
    setSessions(s.data||[]);
    setAcwr(w.data||[]);
    setWellness(well.data||[]);
    setInjuries(inj.data||[]);
    setLoading(false);
  }
  useEffect(() => { loadAll(); }, []);

  const tabs = [["sessions",t.nav_sessions],["results",t.nav_results],["wellness",t.nav_wellness],["injuries",t.nav_injuries],["teams",t.nav_teams],["athletes",t.nav_athletes],["profile",t.nav_profile]];

  return (
    <div>
      <TopBar t={t} LangToggle={LangToggle} tabs={tabs} tab={tab} setTab={setTab}/>
      <div style={{padding:22}}>
        {loading ? <div style={{color:C.sub, padding:"30px 0", textAlign:"center"}}>{t.loading}</div> : (
          <React.Fragment>
            {tab==="sessions" && <Sessions t={t} lang={lang} profile={profile} athletes={athletes} teams={teams} sessions={sessions} reload={loadAll}/>}
            {tab==="results"  && <Results t={t} lang={lang} athletes={athletes} teams={teams} sessions={sessions} acwr={acwr} reload={loadAll}/>}
            {tab==="wellness" && <WellnessCoach t={t} lang={lang} athletes={athletes} teams={teams} wellness={wellness}/>}
            {tab==="injuries" && <InjuriesCoach t={t} lang={lang} profile={profile} athletes={athletes} injuries={injuries} reload={loadAll}/>}
            {tab==="teams"    && <Teams t={t} athletes={athletes} teams={teams} reload={loadAll}/>}
            {tab==="athletes" && <AthletesAdmin t={t} athletes={athletes} reload={loadAll}/>}
            {tab==="profile"  && <CoachProfile t={t} profile={profile}/>}
          </React.Fragment>
        )}
      </div>
    </div>
  );
}

  const [ok,setOk] = useState(false);
  async function save(){
    await db.from("profiles").update({ full_name:p.full_name, username:p.username }).eq("id", profile.id);
    setOk(true); setTimeout(()=>setOk(false),1500);
  }
  return (
    <div style={{maxWidth:480}}>

    if(!f.full_name.trim() || !f.email.trim()) return;

      body: { full_name:f.full_name, email:f.email, username:f.username }
    });
    setBusy(false);
    if(error || (data && data.error)) { setErr((data && data.error) || "No se pudo crear el deportista"); return; }

function Teams({t, athletes, teams, reload}) {

  const [busy,setBusy] = useState(false);
  const [editingId,setEditingId] = useState(null);
  const [editName,setEditName] = useState("");
  const [editPicked,setEditPicked] = useState([]);

  async function create(){
    if(!name.trim()) return;
    setBusy(true);
    const { data: prof } = await db.auth.getUser();
    const { data: tm } = await db.from("teams").insert({ coach_id: prof.user.id, name }).select("id").single();
    if(tm && picked.length) await db.from("team_members").insert(picked.map(aid=>({team_id:tm.id, athlete_id:aid})));
    setBusy(false); setName(""); setPicked([]); setCreating(false);
    reload();
  }
  const toggle = (id)=> setPicked(picked.includes(id)?picked.filter(x=>x!==id):[...picked,id]);

  function startEdit(tm){ setEditingId(tm.id); setEditName(tm.name); setEditPicked([...tm.memberIds]); }
  const toggleEdit = (id)=> setEditPicked(editPicked.includes(id)?editPicked.filter(x=>x!==id):[...editPicked,id]);

  async function saveEdit(tm){
    setBusy(true);
    if(editName.trim() && editName !== tm.name){
      await db.from("teams").update({ name:editName }).eq("id", tm.id);
    }
    const cur = tm.memberIds;
    const toAdd = editPicked.filter(id=>!cur.includes(id));
    const toRemove = cur.filter(id=>!editPicked.includes(id));
    if(toAdd.length) await db.from("team_members").insert(toAdd.map(aid=>({team_id:tm.id, athlete_id:aid})));
    if(toRemove.length) await db.from("team_members").delete().eq("team_id", tm.id).in("athlete_id", toRemove);
    setBusy(false); setEditingId(null);
    reload();
  }

  async function deleteTeam(tm){
    if(tm.memberIds.length > 0){ alert(t.team_has_athletes); return; }

    await db.from("teams").delete().eq("id", tm.id);
    reload();

          <span style={{color:C.sub, fontSize:13, fontWeight:600}}>{t.members}</span>
          <div style={{display:"flex", flexWrap:"wrap", gap:8, margin:"8px 0 16px"}}>
            {athletes.map(a=>(
              <button key={a.id} onClick={()=>toggle(a.id)}
                style={btn(picked.includes(a.id)?C.brand:C.panel2,{padding:"8px 13px", fontSize:13, color:picked.includes(a.id)?"#fff":C.sub})}>
                {a.full_name}
              </button>
            ))}
          </div>
          <div style={{display:"flex", gap:10}}>
            <button disabled={busy} onClick={create} style={btn(C.brand,{opacity:busy?0.7:1})}>{t.create}</button>
            <button onClick={()=>setCreating(false)} style={btn(C.panel2,{color:C.sub})}>{t.cancel}</button>
          </div>
        </div>
      )}
      <div style={{display:"grid", gap:12}}>
        {teams.map(tm=>(
          <div key={tm.id} style={card}>
            {editingId === tm.id ? (
              <div>
                <Field label={t.team_name} value={editName} onChange={setEditName}/>
                <span style={{color:C.sub, fontSize:13, fontWeight:600}}>{t.members}</span>
                <div style={{display:"flex", flexWrap:"wrap", gap:8, margin:"8px 0 16px"}}>
                  {athletes.map(a=>(
                    <button key={a.id} onClick={()=>toggleEdit(a.id)}
                      style={btn(editPicked.includes(a.id)?C.brand:C.panel2,{padding:"8px 13px", fontSize:13, color:editPicked.includes(a.id)?"#fff":C.sub})}>
                      {a.full_name}
                    </button>
                  ))}
                </div>
                <div style={{display:"flex", gap:10}}>
                  <button disabled={busy} onClick={()=>saveEdit(tm)} style={btn(C.brand,{opacity:busy?0.7:1})}>{t.save}</button>
                  <button onClick={()=>setEditingId(null)} style={btn(C.panel2,{color:C.sub})}>{t.cancel}</button>
                </div>
              </div>
            ) : (
              <div>
                <div style={{display:"flex", justifyContent:"space-between", alignItems:"center", gap:10}}>
                  <div style={{fontWeight:700, fontSize:17, fontFamily:"Sora"}}>{tm.name}</div>
                  <div style={{display:"flex", gap:8, flexShrink:0}}>
                    <button onClick={()=>startEdit(tm)} style={btn(C.panel2,{padding:"7px 14px", fontSize:13, color:C.text})}>{t.edit}</button>

                <div style={{display:"flex", flexWrap:"wrap", gap:6, marginTop:10}}>
                  {tm.memberIds.map(id=>{ const a=athletes.find(x=>x.id===id);
                    return <span key={id} style={{background:C.panel2, padding:"5px 11px", borderRadius:999, fontSize:13}}>{a?a.full_name:"—"}</span>; })}
                </div>
              </div>
            )}
          </div>
        ))}
      </div>
    </div>
  );
}

                      borderLeft:`3px solid ${e.submitted_at?C.green:C.orange}`}}>
                      {a?a.full_name:"—"} · {e.submitted_at?`RPE ${e.rpe}`:t.pending}

                  );})}
              </div>
            </div>
          );})}

function lastLoadFor(sessions, aid){
  let best=null;
  for(const s of sessions){
    const e=(s.session_athletes||[]).find(x=>x.athlete_id===aid && x.rpe!=null);
    if(e){ if(!best || s.session_date > best.date) best={date:s.session_date, load:e.rpe*e.minutes}; }
  }
  return best?best.load:null;
}

function Results({t, lang, athletes, teams, sessions, acwr, reload}) {
  const [teamId,setTeamId] = useState(teams[0]?teams[0].id:"");
  const team = teams.find(x=>x.id===teamId);

  async function toggleVis(aid, cur){
    await db.from("profiles").update({ acwr_visible: !cur }).eq("id", aid);
    reload();
  }

  const rows = useMemo(()=>{
    if(!team) return [];
    return team.memberIds.map(aid=>{
      const a = athletes.find(x=>x.id===aid) || {id:aid, full_name:"—"};
      const m = acwr.find(r=>r.athlete_id===aid && r.team_id===teamId);
      const val = m ? Number(m.acwr) : 0;
      const hasData = !!m && val>0;
      return {
        a, acwr:val, hasData,
        acute: m?Number(m.acute_7d):0, chronic: m?Number(m.chronic_28d):0,
        lastLoad: lastLoadFor(sessions, aid),
      };
    });
  }, [team, teamId, athletes, acwr, sessions]);

  const legend = [[C.blue,t.leg_blue],[C.green,t.leg_green],[C.orange,t.leg_orange],[C.red,t.leg_red]];

  return (
    <div>
      <div style={{display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:16, flexWrap:"wrap", gap:10}}>
        <h2 style={{fontFamily:"Sora", margin:0}}>{t.results_title}</h2>

          <select value={teamId} onChange={(e)=>setTeamId(e.target.value)}
            style={{padding:"10px 14px", borderRadius:12, background:C.panel2, border:`1px solid ${C.line}`, color:C.text, fontSize:14}}>
            {teams.map(tm=><option key={tm.id} value={tm.id}>{tm.name}</option>)}
          </select>
        )}
      </div>

      {!team && <div style={{color:C.sub}}>{t.no_teams}</div>}

      <div style={{display:"grid", gap:12}}>
        {rows.map(r=>{
          const col = acwrColor(r.acwr, r.hasData);
          const val = r.hasData ? r.acwr.toFixed(2).replace(".", lang==="es"?",":".") : t.no_data;
          const aObj = athletes.find(x=>x.id===r.a.id);
          return (
            <div key={r.a.id} style={{...card, padding:0, overflow:"hidden", borderLeft:`6px solid ${col}`}}>
              <div style={{display:"flex", justifyContent:"space-between", alignItems:"center", gap:12, padding:"16px 18px"}}>
                <div style={{minWidth:0}}>
                  <div style={{fontFamily:"Sora", fontWeight:800, fontSize:19, color:col, lineHeight:1.15}}>{r.a.full_name}</div>
                  <div style={{color:C.sub, fontSize:12.5, marginTop:2}}>{t.bands[bandIndex(r.acwr, r.hasData)]}</div>
                </div>
                <div style={{textAlign:"center", flexShrink:0}}>
                  <div style={{background:col, color:"#fff", fontFamily:"Sora", fontWeight:800, fontSize:26, minWidth:78, padding:"8px 14px", borderRadius:14}}>{val}</div>
                  <div style={{color:C.sub, fontSize:11, marginTop:4, letterSpacing:0.5}}>{t.acwr}</div>
                </div>
              </div>
              <div style={{display:"flex", gap:8, padding:"0 18px 14px", flexWrap:"wrap"}}>
                {[[t.load_col, r.lastLoad??"—"], [t.acute, Math.round(r.acute)], [t.chronic, Math.round(r.chronic)]].map(([lab,v])=>(
                  <div key={lab} style={{flex:"1 1 90px", background:C.panel2, borderRadius:10, padding:"8px 10px"}}>
                    <div style={{color:C.sub, fontSize:11}}>{lab}</div>
                    <div style={{fontWeight:700, fontSize:15, marginTop:2}}>{v}</div>
                  </div>
                ))}
              </div>
              <div style={{display:"flex", justifyContent:"space-between", alignItems:"center", padding:"12px 18px", borderTop:`1px solid ${C.line}`}}>
                <span style={{color:C.sub, fontSize:13}}>{t.show_acwr_athlete}</span>

  );

                <div style={{fontFamily:"Sora", fontWeight:800, fontSize:18}}>{a.full_name}</div>
                {w ? (
                  <div style={{textAlign:"center"}}>
                    <div style={{background:col, color:"#fff", fontWeight:800, fontSize:20, padding:"6px 14px", borderRadius:12}}>{w.wellness_score}</div>
                    <div style={{color:C.sub, fontSize:11, marginTop:3}}>{t.w_score} · {fmtDate(w.entry_date, lang)}</div>
                  </div>
                ) : <span style={{color:C.gray, fontSize:13}}>{t.no_wellness}</span>}
              </div>
              {w && (
                <div style={{display:"flex", gap:8, flexWrap:"wrap", marginTop:12}}>
                  {[[t.w_sleep_q,w.sleep_quality],[t.w_sleep_h,w.sleep_hours],[t.w_fatigue,w.fatigue],[t.w_soreness,w.soreness],[t.w_stress,w.stress],[t.w_mood,w.mood]].map(([lab,v])=>(
                    <div key={lab} style={{flex:"1 1 80px", background:C.panel2, borderRadius:10, padding:"7px 9px"}}>
                      <div style={{color:C.sub, fontSize:11}}>{lab}</div>
                      <div style={{fontWeight:700, fontSize:15, marginTop:2}}>{v}</div>
                    </div>
                  ))}
                </div>
              )}
            </div>
          );
        })}
      </div>
    </div>
  );
}

/* ---------------- Lesiones (Preparador) ---------------- */
function InjuriesCoach({t, lang, profile, athletes, injuries, reload}) {
  const [creating,setCreating] = useState(false);
  const todayStr = new Date().toISOString().slice(0,10);
  const empty = { athlete_id:(athletes[0]?athletes[0].id:""), body_area:"", injury_type:"", mechanism:"", onset_date:todayStr, severity:3, status:"active", days_lost:0, expected_return:"", notes:"" };
  const [f,setF] = useState(empty);
  const [busy,setBusy] = useState(false);

  async function create(){
    if(!f.athlete_id || !f.body_area.trim()) return;
    setBusy(true);
    await db.from("injuries").insert({
      athlete_id:f.athlete_id, body_area:f.body_area, injury_type:f.injury_type||null, mechanism:f.mechanism||null,
      onset_date:f.onset_date, severity:parseInt(f.severity)||null, status:f.status,
      days_lost:parseInt(f.days_lost)||0, expected_return:f.expected_return||null, notes:f.notes||null, created_by:profile.id
    });
    setBusy(false); setCreating(false); setF(empty); reload();
  }
  async function setStatus(id, status){ await db.from("injuries").update({status}).eq("id", id); reload(); }

  const inputStyle = {width:"100%", marginTop:6, padding:"11px 13px", borderRadius:11, background:C.panel2, border:`1px solid ${C.line}`, color:C.text, fontSize:15};

  return (
    <div>
      <div style={{display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:16}}>
        <h2 style={{fontFamily:"Sora", margin:0}}>{t.injuries_title}</h2>
        {!creating && athletes.length>0 && <button onClick={()=>setCreating(true)} style={btn(C.brand)}>{t.new_injury}</button>}
      </div>

      {creating && (
        <div style={{...card, marginBottom:16}}>
          <label style={{display:"block", marginBottom:14}}>
            <span style={{color:C.sub, fontSize:13, fontWeight:600}}>{t.select_athlete}</span>
            <select value={f.athlete_id} onChange={(e)=>setF({...f,athlete_id:e.target.value})} style={inputStyle}>
              {athletes.map(a=><option key={a.id} value={a.id}>{a.full_name}</option>)}
            </select>
          </label>
          <Field label={t.i_body} value={f.body_area} onChange={(v)=>setF({...f,body_area:v})}/>
          <Field label={t.i_type} value={f.injury_type} onChange={(v)=>setF({...f,injury_type:v})}/>
          <Field label={t.i_mechanism} value={f.mechanism} onChange={(v)=>setF({...f,mechanism:v})}/>
          <Field label={t.i_onset} type="date" value={f.onset_date} onChange={(v)=>setF({...f,onset_date:v})}/>
          <Field label={t.i_severity} type="number" value={f.severity} onChange={(v)=>setF({...f,severity:v})}/>
          <label style={{display:"block", marginBottom:14}}>
            <span style={{color:C.sub, fontSize:13, fontWeight:600}}>{t.i_status}</span>
            <select value={f.status} onChange={(e)=>setF({...f,status:e.target.value})} style={inputStyle}>
              {INJURY_STATUS.map(s=><option key={s} value={s}>{injuryStatusLabel(t,s)}</option>)}
            </select>
          </label>
          <Field label={t.i_days} type="number" value={f.days_lost} onChange={(v)=>setF({...f,days_lost:v})}/>
          <Field label={t.i_return} type="date" value={f.expected_return} onChange={(v)=>setF({...f,expected_return:v})}/>
          <Field label={t.i_notes} value={f.notes} onChange={(v)=>setF({...f,notes:v})}/>
          <div style={{display:"flex", gap:10}}>
            <button disabled={busy} onClick={create} style={btn(C.brand,{opacity:busy?0.7:1})}>{t.create}</button>
            <button onClick={()=>setCreating(false)} style={btn(C.panel2,{color:C.sub})}>{t.cancel}</button>
          </div>
        </div>
      )}

      {injuries.length===0 && !creating && <div style={{color:C.sub}}>{t.no_injuries}</div>}
      <div style={{display:"grid", gap:12}}>
        {injuries.map(inj=>{ const a=athletes.find(x=>x.id===inj.athlete_id); const col=injuryColor(inj.status);
          return (
            <div key={inj.id} style={{...card, borderLeft:`6px solid ${col}`}}>
              <div style={{display:"flex", justifyContent:"space-between", alignItems:"flex-start", gap:10}}>
                <div>
                  <div style={{fontFamily:"Sora", fontWeight:800, fontSize:17}}>{a?a.full_name:"—"}</div>
                  <div style={{fontWeight:600, marginTop:2}}>{inj.body_area}{inj.injury_type?` · ${inj.injury_type}`:""}</div>
                  <div style={{color:C.sub, fontSize:12.5, marginTop:4}}>
                    {fmtDate(inj.onset_date, lang)}{inj.mechanism?` · ${inj.mechanism}`:""}
                    {inj.days_lost?` · ${inj.days_lost} ${lang==="es"?"días baja":"days"}`:""}
                  </div>
                  {inj.notes && <div style={{color:C.sub, fontSize:12.5, marginTop:6}}>{inj.notes}</div>}
                </div>
                <select value={inj.status} onChange={(e)=>setStatus(inj.id, e.target.value)}
                  style={{padding:"7px 10px", borderRadius:10, background:col, color:"#fff", border:"none", fontSize:12.5, fontWeight:700}}>
                  {INJURY_STATUS.map(s=><option key={s} value={s} style={{background:C.panel, color:C.text}}>{injuryStatusLabel(t,s)}</option>)}
                </select>
              </div>
            </div>
          );})}
      </div>
    </div>
  );
}

/* ---------------- Cambiar contraseña ---------------- */
function ChangePassword({t}) {
  const [p1,setP1] = useState(""); const [p2,setP2] = useState("");
  const [msg,setMsg] = useState(""); const [ok,setOk] = useState(false); const [busy,setBusy] = useState(false);
  async function change(){
    setMsg("");
    if(p1.length<6){ setOk(false); setMsg(t.pwd_short); return; }
    if(p1!==p2){ setOk(false); setMsg(t.pwd_mismatch); return; }
    setBusy(true);
    const { error } = await db.auth.updateUser({ password:p1 });
    setBusy(false);
    if(error){ setOk(false); setMsg(error.message); }
    else { setOk(true); setMsg(t.pwd_changed); setP1(""); setP2(""); }
  }
  return (
    <div style={{...card, maxWidth:480, marginTop:16}}>
      <h3 style={{fontFamily:"Sora", marginTop:0}}>{t.change_password}</h3>
      <Field label={t.new_password} type="password" value={p1} onChange={setP1}/>
      <Field label={t.repeat_password} type="password" value={p2} onChange={setP2}/>
      {msg && <div style={{color:ok?C.green:C.red, fontSize:13, marginBottom:12}}>{msg}</div>}
      <button disabled={busy} onClick={change} style={btn(C.brand,{opacity:busy?0.7:1})}>{t.change_password}</button>
    </div>
  );
}

/* ---------------- Atleta ---------------- */
function AthleteApp({t, lang, LangToggle, profile}) {
  const [tab, setTab] = useState("training");
  const [sessions, setSessions] = useState([]);
  const [acwr, setAcwr] = useState(null);
  const [injuries, setInjuries] = useState([]);
  const [loading, setLoading] = useState(true);
  const [active, setActive] = useState(null);

  async function loadMine(){
    const [s, w, inj] = await Promise.all([
      db.from("session_athletes")
        .select("id,minutes,rpe,submitted_at,sessions(id,session_date,team_id,teams(name))")
        .eq("athlete_id", profile.id),
      db.from("v_athlete_acwr").select("*").eq("athlete_id", profile.id),
      db.from("injuries").select("*").eq("athlete_id", profile.id).order("onset_date",{ascending:false}),
    ]);
    const list = (s.data||[]).map(r=>({
      id:r.id, minutes:r.minutes, rpe:r.rpe, submitted_at:r.submitted_at,
      session_date:r.sessions ? r.sessions.session_date : null,
      team_name:r.sessions && r.sessions.teams ? r.sessions.teams.name : "—",
    })).filter(r=>r.session_date).sort((a,b)=> a.session_date < b.session_date ? 1 : -1);
    setSessions(list);
    setAcwr((w.data && w.data[0]) ? w.data[0] : null);
    setInjuries(inj.data||[]);
    setLoading(false);
  }
  useEffect(()=>{ loadMine(); }, []);

  async function submit(id, rpe){
    await db.rpc("submit_rpe", { p_session_athlete:id, p_rpe:rpe });
    setActive(null);
    loadMine();
  }

  if(active){ const s=sessions.find(x=>x.id===active);
    return <RPEScreen t={t} session={s} onSave={(rpe)=>submit(s.id, rpe)} onBack={()=>setActive(null)}/>; }

  const v = acwr ? Number(acwr.acwr) : 0;
  const hasData = !!acwr && v>0;
  const col = acwrColor(v, hasData);
  const visible = !!profile.acwr_visible;
  const atabs = [["training",t.nav_training],["wellness",t.nav_wellness],["profile",t.nav_profile]];

  return (
    <div>
      <TopBar t={t} LangToggle={LangToggle} tabs={atabs} tab={tab} setTab={setTab}/>
      <div style={{padding:22}}>

        {tab==="training" && (
          <React.Fragment>
            {visible && (
              <div style={{...card, marginBottom:20, display:"flex", justifyContent:"space-between", alignItems:"center"}}>
                <div>
                  <div style={{color:C.sub, fontSize:13, fontWeight:600}}>{t.your_acwr}</div>
                  <div style={{fontSize:13, color:col, fontWeight:700, marginTop:4}}>{t.bands[bandIndex(v,hasData)]}</div>
                </div>
                <span style={{background:col, color:"#fff", fontWeight:800, fontSize:22, padding:"10px 18px", borderRadius:14}}>
                  {hasData ? v.toFixed(2).replace(".", lang==="es"?",":".") : "—"}
                </span>
              </div>
            )}
            <h2 style={{fontFamily:"Sora"}}>{t.your_sessions}</h2>
            {loading ? <div style={{color:C.sub}}>{t.loading}</div> : (
              <div style={{display:"grid", gap:12}}>
                {sessions.length===0 && <div style={{color:C.sub}}>{t.no_pending}</div>}
                {sessions.map(s=>(
                  <div key={s.id} style={{...card, display:"flex", justifyContent:"space-between", alignItems:"center", gap:12}}>
                    <div>
                      <div style={{fontWeight:700}}>{s.team_name}</div>
                      <div style={{color:C.sub, fontSize:13}}>{fmtDate(s.session_date, lang)} · {s.minutes} {t.minutes_label}</div>
                    </div>
                    {s.submitted_at
                      ? <span style={{color:C.green, fontWeight:700, fontSize:14}}>✓ {t.done} (RPE {s.rpe})</span>
                      : <button onClick={()=>setActive(s.id)} style={btn(C.brand)}>{t.complete_survey}</button>}
                  </div>
                ))}
              </div>
            )}
          </React.Fragment>
        )}

        {tab==="wellness" && <WellnessForm t={t} lang={lang} profile={profile}/>}
        {tab==="profile"  && <AthleteProfile t={t} lang={lang} profile={profile} injuries={injuries}/>}
      </div>
    </div>
  );
}

function WellnessForm({t, lang, profile}) {
  const todayStr = new Date().toISOString().slice(0,10);
  const [w,setW] = useState({sleep_quality:3, sleep_hours:7.5, fatigue:3, soreness:3, stress:3, mood:3, notes:""});
  const [ok,setOk] = useState(false);
  const [busy,setBusy] = useState(false);

  useEffect(()=>{
    db.from("wellness_entries").select("*").eq("athlete_id", profile.id).eq("entry_date", todayStr).maybeSingle()
      .then(({data})=>{ if(data) setW({sleep_quality:data.sleep_quality, sleep_hours:data.sleep_hours, fatigue:data.fatigue, soreness:data.soreness, stress:data.stress, mood:data.mood, notes:data.notes||""}); });
  }, []);

  async function save(){
    setBusy(true);
    await db.from("wellness_entries").upsert({
      athlete_id:profile.id, entry_date:todayStr,
      sleep_quality:w.sleep_quality, sleep_hours:w.sleep_hours, fatigue:w.fatigue,
      soreness:w.soreness, stress:w.stress, mood:w.mood, notes:w.notes||null
    }, { onConflict:"athlete_id,entry_date" });
    setBusy(false); setOk(true); setTimeout(()=>setOk(false), 1800);
  }

  return (
    <div style={{maxWidth:480}}>
      <h2 style={{fontFamily:"Sora"}}>{t.wellness_today}</h2>
      <div style={card}>
        <Scale label={t.w_sleep_q} hint={t.w_hint_good} value={w.sleep_quality} onChange={(n)=>setW({...w,sleep_quality:n})}/>
        <label style={{display:"block", marginBottom:14}}>
          <span style={{color:C.text, fontSize:14, fontWeight:600}}>{t.w_sleep_h}</span>
          <input type="number" step="0.5" min="0" max="14" value={w.sleep_hours}
            onChange={(e)=>setW({...w, sleep_hours:parseFloat(e.target.value)})}
            style={{width:"100%", marginTop:6, padding:"11px 13px", borderRadius:11, background:C.panel2, border:`1px solid ${C.line}`, color:C.text, fontSize:15}}/>
        </label>
        <Scale label={t.w_fatigue} hint={t.w_hint_bad} value={w.fatigue} onChange={(n)=>setW({...w,fatigue:n})}/>
        <Scale label={t.w_soreness} hint={t.w_hint_bad} value={w.soreness} onChange={(n)=>setW({...w,soreness:n})}/>
        <Scale label={t.w_stress} hint={t.w_hint_bad} value={w.stress} onChange={(n)=>setW({...w,stress:n})}/>
        <Scale label={t.w_mood} hint={t.w_hint_good} value={w.mood} onChange={(n)=>setW({...w,mood:n})}/>
        <label style={{display:"block", marginBottom:16}}>
          <span style={{color:C.sub, fontSize:13, fontWeight:600}}>{t.w_notes}</span>
          <textarea value={w.notes} onChange={(e)=>setW({...w,notes:e.target.value})} rows={2}
            style={{width:"100%", marginTop:6, padding:"11px 13px", borderRadius:11, background:C.panel2, border:`1px solid ${C.line}`, color:C.text, fontSize:15, fontFamily:"inherit", resize:"vertical"}}/>
        </label>
        <button disabled={busy} onClick={save} style={btn(C.brand,{width:"100%", opacity:busy?0.7:1})}>{ok?t.wellness_saved:t.save}</button>
      </div>
    </div>
  );
}

function AthleteProfile({t, lang, profile, injuries}) {
  return (
    <div style={{maxWidth:480}}>
      <h2 style={{fontFamily:"Sora"}}>{t.nav_profile}</h2>
      <div style={card}>
        <div style={{fontWeight:700, fontSize:17}}>{profile.full_name}</div>
        <div style={{color:C.sub, fontSize:13, marginTop:4}}>{profile.username||"—"} · {profile.email||"—"}</div>
      </div>

      <h3 style={{fontFamily:"Sora", marginTop:24}}>{t.my_injuries}</h3>
      {(!injuries || injuries.length===0) ? <div style={{color:C.sub}}>{t.no_injuries}</div> : (
        <div style={{display:"grid", gap:10}}>
          {injuries.map(inj=>{ const col=injuryColor(inj.status);
            return (
              <div key={inj.id} style={{...card, borderLeft:`6px solid ${col}`}}>
                <div style={{display:"flex", justifyContent:"space-between", alignItems:"center", gap:10}}>
                  <div style={{fontWeight:700}}>{inj.body_area}{inj.injury_type?` · ${inj.injury_type}`:""}</div>
                  <span style={{background:col, color:"#fff", fontSize:12, fontWeight:700, padding:"5px 10px", borderRadius:9}}>{injuryStatusLabel(t,inj.status)}</span>
                </div>
                <div style={{color:C.sub, fontSize:12.5, marginTop:4}}>{fmtDate(inj.onset_date, lang)}{inj.expected_return?` → ${fmtDate(inj.expected_return, lang)}`:""}</div>
                {inj.notes && <div style={{color:C.sub, fontSize:12.5, marginTop:6}}>{inj.notes}</div>}
              </div>
            );})}
        </div>
      )}

      <ChangePassword t={t}/>
    </div>
  );
}

function RPEScreen({t, session, onSave, onBack}) {
  const [v,setV] = useState(5);
  const [busy,setBusy] = useState(false);
  const pct = (v/10)*100;
  const trackBg = `linear-gradient(90deg, ${C.fill} 0%, ${C.fill} ${pct}%, ${C.panel2} ${pct}%, ${C.panel2} 100%)`;
  return (
    <div style={{padding:"20px 24px 40px", minHeight:"100vh", display:"flex", flexDirection:"column"}}>
      <button onClick={onBack} style={{background:"none", border:"none", color:C.text, fontSize:26, cursor:"pointer", alignSelf:"flex-start"}}>←</button>
      <div style={{textAlign:"center", marginTop:30}}>
        <h1 style={{fontFamily:"Sora", fontWeight:800, fontSize:30, lineHeight:1.15, margin:"0 auto", maxWidth:420}}>{t.rpe_question}</h1>
        <p style={{color:C.sub, fontWeight:700, fontSize:18, marginTop:18, minHeight:28}}>{t.rpe[v]}</p>
      </div>
      <div style={{flex:1, display:"flex", alignItems:"center", justifyContent:"center"}}>
        <div style={{width:130, height:130, borderRadius:"50%", background:C.panel2, display:"flex", alignItems:"center", justifyContent:"center", fontFamily:"Sora", fontWeight:800, fontSize:54}}>{v}</div>
      </div>
      <div style={{margin:"0 0 28px"}}>
        <input className="cg-range" type="range" min={0} max={10} step={1} value={v} onChange={(e)=>setV(parseInt(e.target.value))} style={{background:trackBg}}/>
        <div style={{display:"flex", justifyContent:"space-between", color:C.gray, fontSize:12, marginTop:8, padding:"0 4px"}}>
          <span>0</span><span>5</span><span>10</span>
        </div>
      </div>
      <button disabled={busy} onClick={()=>{ setBusy(true); onSave(v); }} style={btn(C.brandBright,{width:"100%", padding:"16px", fontSize:17, borderRadius:16, opacity:busy?0.7:1})}>{t.save}</button>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
