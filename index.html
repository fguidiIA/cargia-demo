/* ---------------- Datos de ejemplo ---------------- */
const today = new Date(); today.setHours(0,0,0,0);
const dateFromOffset = (n) => { const d = new Date(today); d.setDate(d.getDate()-n); return d; };

const ATHLETES_SEED = [
  { id:"a1", name:"Marcos Pérez", email:"marcos@demo.es", username:"marcos" },
  { id:"a2", name:"Lucía Romero", email:"lucia@demo.es", username:"lucia" },
  { id:"a3", name:"Diego Soler", email:"diego@demo.es", username:"diego" },
  { id:"a4", name:"Sara Núñez", email:"sara@demo.es", username:"sara" },
  { id:"a5", name:"Javier Marín", email:"javier@demo.es", username:"javier" },
];
const TEAMS_SEED = [
  { id:"t1", name:"Sub-23 Fútbol", memberIds:["a1","a2","a3"] },
  { id:"t2", name:"Atletismo Élite", memberIds:["a4","a5"] },
];
const RPE_PLAN = { a1:[6,6,6,6], a2:[8,2,2,2], a3:[2,7,7,7], a4:[8,5,5,5], a5:[null,5,5,5] };
const WEEK_OFFSETS = [[2,4,6],[9,11,13],[16,18,20],[23,25,27]];

function buildSeedSessions() {
  const out = []; let sid = 1;
  for (const team of TEAMS_SEED) {
    for (let w=0; w<4; w++) {
      for (const off of WEEK_OFFSETS[w]) {
        const entries = team.memberIds.map((aid) => {
          let rpe = RPE_PLAN[aid][w];
          if (aid==="a2" && off===2) rpe = null; // demo de "pendiente"
          return { athleteId:aid, minutes:90, rpe, submitted: rpe!==null };
        });
        out.push({ id:"s"+sid++, teamId:team.id, dateOffset:off, entries });
      }
    }
  }
  return out;
}

/* ---------------- ACWR ---------------- */
function loadsForAthlete(sessions, aid) {
  const arr = [];
  for (const s of sessions) {
    const e = s.entries.find((x)=>x.athleteId===aid);
    if (e && e.rpe!==null && e.rpe!==undefined) arr.push({ offset:s.dateOffset, load:e.rpe*e.minutes });
  }
  return arr;
}
function acwrFor(sessions, aid) {
  const loads = loadsForAthlete(sessions, aid);
  const acute  = loads.filter(l=>l.offset<=7).reduce((a,b)=>a+b.load,0);
  const sum28  = loads.filter(l=>l.offset<=28).reduce((a,b)=>a+b.load,0);
  const chronic = sum28/4;
  const acwr = chronic>0 ? acute/chronic : 0;
  return { acute, chronic, acwr, hasData: loads.length>0 };
}
function acwrColor(v, hasData) {
  if (!hasData || v===0) return C.gray;
  if (v<0.8) return C.blue;
  if (v<=1.3) return C.green;
  if (v<=1.6) return C.orange;
  return C.red;
}
function bandIndex(v, hasData){ if(!hasData||v===0) return 4; if(v<0.8) return 0; if(v<=1.3) return 1; if(v<=1.6) return 2; return 3; }
const fmtDate = (d, locale) => d.toLocaleDateString(locale==="es"?"es-ES":"en-GB",{day:"2-digit",month:"short"});
const genPwd = () => { const s="ABCDEFGHJKMNPQRSTUVWXYZ23456789"; let p="Cg"; for(let i=0;i<6;i++) p+=s[Math.floor(Math.random()*s.length)]; return p; };

  const LangToggle = () => (

/* ---------------- TopBar ---------------- */
function TopBar({t, LangToggle, onLogout, tabs, tab, setTab}) {

/* ---------------- Coach ---------------- */

    <div>
      <TopBar t={t} LangToggle={props.LangToggle} onLogout={props.onLogout} tabs={tabs} tab={tab} setTab={setTab}/>
      <div style={{padding:22}}>
        {tab==="profile"  && <CoachProfile t={t}/>}
        {tab==="athletes" && <AthletesAdmin {...props}/>}
        {tab==="teams"    && <Teams {...props}/>}
        {tab==="sessions" && <Sessions {...props}/>}
        {tab==="results"  && <Results {...props}/>}
      </div>
    </div>
  );
}

function CoachProfile({t}) {

  return (

function AthletesAdmin({t, athletes, setAthletes}) {
  const [creating,setCreating] = useState(false);
  const [f,setF] = useState({name:"", email:"", username:""});
  const [cred,setCred] = useState(null);
  const [copied,setCopied] = useState(false);

  const create = () => {
    if(!f.name.trim()||!f.username.trim()) return;
    const id = "a"+Date.now();
    const pwd = genPwd();
    setAthletes([...athletes, {id, ...f}]);
    setCred({...f, pwd});
    setF({name:"",email:"",username:""}); setCreating(false);
  };
  const copy = () => {
    const txt = `Cargia\n${t.username}: ${cred.username}\n${t.temp_password}: ${cred.pwd}`;
    if(navigator.clipboard) navigator.clipboard.writeText(txt);
    setCopied(true); setTimeout(()=>setCopied(false),1500);
  };

  return (
    <div>
      <div style={{display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:16}}>
        <h2 style={{fontFamily:"Sora", margin:0}}>{t.athletes_title}</h2>
        {!creating && <button onClick={()=>{setCreating(true); setCred(null);}} style={btn(C.brand)}>{t.new_athlete}</button>}
      </div>

      {creating && (
        <div style={{...card, marginBottom:16}}>
          <Field label={t.name} value={f.name} onChange={(v)=>setF({...f,name:v})}/>
          <Field label={t.email} value={f.email} onChange={(v)=>setF({...f,email:v})}/>
          <Field label={t.username} value={f.username} onChange={(v)=>setF({...f,username:v})}/>
          <div style={{display:"flex", gap:10}}>
            <button onClick={create} style={btn(C.brand)}>{t.create}</button>
            <button onClick={()=>setCreating(false)} style={btn(C.panel2,{color:C.sub})}>{t.cancel}</button>
          </div>
        </div>
      )}

      {cred && (
        <div style={{...card, marginBottom:16, borderColor:C.brand}}>
          <div style={{fontWeight:700, marginBottom:8}}>{cred.name}</div>
          <div style={{color:C.sub, fontSize:14, marginBottom:4}}>{t.username}: <b style={{color:C.text}}>{cred.username}</b></div>
          <div style={{color:C.sub, fontSize:14, marginBottom:12}}>{t.temp_password}: <b style={{color:C.text, fontFamily:"monospace"}}>{cred.pwd}</b></div>
          <p style={{color:C.sub, fontSize:12.5, marginTop:0}}>{t.credentials_note}</p>
          <button onClick={copy} style={btn(C.panel2,{color:C.text})}>{copied?t.copied:t.copy}</button>
        </div>
      )}

      <div style={{display:"grid", gap:10}}>
        {athletes.map(a=>(
          <div key={a.id} style={{...card, display:"flex", justifyContent:"space-between", alignItems:"center"}}>
            <div>
              <div style={{fontWeight:600}}>{a.name}</div>
              <div style={{color:C.sub, fontSize:13}}>{a.username} · {a.email||"—"}</div>
            </div>
          </div>
        ))}
      </div>
    </div>
  );
}

function Teams({t, athletes, teams, setTeams}) {
  const [creating,setCreating] = useState(false);
  const [name,setName] = useState("");
  const [picked,setPicked] = useState([]);
  const create = () => {
    if(!name.trim()) return;
    setTeams([...teams, {id:"t"+Date.now(), name, memberIds:picked}]);
    setName(""); setPicked([]); setCreating(false);
  };
  const toggle = (id)=> setPicked(picked.includes(id)?picked.filter(x=>x!==id):[...picked,id]);
  return (
    <div>
      <div style={{display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:16}}>
        <h2 style={{fontFamily:"Sora", margin:0}}>{t.teams_title}</h2>
        {!creating && <button onClick={()=>setCreating(true)} style={btn(C.brand)}>{t.new_team}</button>}
      </div>
      {creating && (
        <div style={{...card, marginBottom:16}}>
          <Field label={t.team_name} value={name} onChange={setName}/>
          <span style={{color:C.sub, fontSize:13, fontWeight:600}}>{t.members}</span>
          <div style={{display:"flex", flexWrap:"wrap", gap:8, margin:"8px 0 16px"}}>
            {athletes.map(a=>(
              <button key={a.id} onClick={()=>toggle(a.id)}
                style={btn(picked.includes(a.id)?C.brand:C.panel2,{padding:"8px 13px", fontSize:13, color:picked.includes(a.id)?"#fff":C.sub})}>
                {a.name}
              </button>
            ))}
          </div>
          <div style={{display:"flex", gap:10}}>
            <button onClick={create} style={btn(C.brand)}>{t.create}</button>
            <button onClick={()=>setCreating(false)} style={btn(C.panel2,{color:C.sub})}>{t.cancel}</button>
          </div>
        </div>
      )}
      <div style={{display:"grid", gap:12}}>
        {teams.map(tm=>(
          <div key={tm.id} style={card}>
            <div style={{fontWeight:700, fontSize:17, fontFamily:"Sora"}}>{tm.name}</div>
            <div style={{color:C.sub, fontSize:13, marginTop:4}}>{t.athletes_count(tm.memberIds.length)}</div>
            <div style={{display:"flex", flexWrap:"wrap", gap:6, marginTop:10}}>
              {tm.memberIds.map(id=>{ const a=athletes.find(x=>x.id===id);
                return <span key={id} style={{background:C.panel2, padding:"5px 11px", borderRadius:999, fontSize:13}}>{a?a.name:"—"}</span>; })}
            </div>
          </div>
        ))}
      </div>
    </div>
  );
}

function Sessions({t, lang, athletes, teams, sessions, setSessions}) {
  const [creating,setCreating] = useState(false);
  const [teamId,setTeamId] = useState(teams[0]?teams[0].id:"");
  const [dateStr,setDateStr] = useState(new Date().toISOString().slice(0,10));
  const [mins,setMins] = useState({});
  const team = teams.find(x=>x.id===teamId);
  const create = () => {
    if(!team) return;
    const offset = Math.round((today - new Date(dateStr+"T00:00:00"))/86400000);
    const entries = team.memberIds.map(aid=>({ athleteId:aid,
      minutes: Math.min(250, Math.max(30, parseInt(mins[aid]||90))), rpe:null, submitted:false }));
    setSessions([{id:"s"+Date.now(), teamId, dateOffset:offset, entries}, ...sessions]);
    setCreating(false); setMins({});
  };
  const shown = [...sessions].sort((a,b)=>a.dateOffset-b.dateOffset);
  return (
    <div>
      <div style={{display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:16}}>
        <h2 style={{fontFamily:"Sora", margin:0}}>{t.sessions_title}</h2>
        {!creating && <button onClick={()=>setCreating(true)} style={btn(C.brand)}>{t.new_session}</button>}
      </div>
      {creating && team && (
        <div style={{...card, marginBottom:16}}>
          <label style={{display:"block", marginBottom:14}}>
            <span style={{color:C.sub, fontSize:13, fontWeight:600}}>{t.select_team}</span>
            <select value={teamId} onChange={(e)=>setTeamId(e.target.value)}
              style={{width:"100%", marginTop:6, padding:"12px 14px", borderRadius:12, background:C.panel2, border:`1px solid ${C.line}`, color:C.text, fontSize:15}}>
              {teams.map(tm=><option key={tm.id} value={tm.id}>{tm.name}</option>)}
            </select>
          </label>
          <Field label={t.date} type="date" value={dateStr} onChange={setDateStr}/>
          <span style={{color:C.sub, fontSize:13, fontWeight:600}}>{t.minutes_each}</span>
          <div style={{display:"grid", gap:8, margin:"8px 0 16px"}}>
            {team.memberIds.map(aid=>{ const a=athletes.find(x=>x.id===aid);
              return (
                <div key={aid} style={{display:"flex", alignItems:"center", gap:12}}>
                  <span style={{flex:1}}>{a?a.name:"—"}</span>
                  <input type="number" min={30} max={250} value={mins[aid]??90}
                    onChange={(e)=>setMins({...mins,[aid]:e.target.value})}
                    style={{width:90, padding:"9px 12px", borderRadius:10, background:C.panel2, border:`1px solid ${C.line}`, color:C.text}}/>
                  <span style={{color:C.sub, fontSize:13}}>{t.minutes_label}</span>
                </div>
              );})}
          </div>
          <div style={{display:"flex", gap:10}}>
            <button onClick={create} style={btn(C.brand)}>{t.create}</button>
            <button onClick={()=>setCreating(false)} style={btn(C.panel2,{color:C.sub})}>{t.cancel}</button>
          </div>
        </div>
      )}
      <div style={{display:"grid", gap:12}}>
        {shown.map(s=>{ const tm=teams.find(x=>x.id===s.teamId);
          const done=s.entries.filter(e=>e.submitted).length;
          return (
            <div key={s.id} style={card}>
              <div style={{display:"flex", justifyContent:"space-between", alignItems:"center"}}>
                <div>
                  <div style={{fontWeight:700, fontFamily:"Sora"}}>{tm?tm.name:"—"}</div>
                  <div style={{color:C.sub, fontSize:13}}>{fmtDate(dateFromOffset(s.dateOffset), lang)}</div>
                </div>
                <div style={{fontSize:13, color:done===s.entries.length?C.green:C.orange, fontWeight:700}}>
                  {done}/{s.entries.length} {t.completed}
                </div>
              </div>
              <div style={{display:"flex", flexWrap:"wrap", gap:6, marginTop:12}}>
                {s.entries.map(e=>{ const a=athletes.find(x=>x.id===e.athleteId);
                  return (
                    <span key={e.athleteId} style={{background:C.panel2, padding:"5px 11px", borderRadius:999, fontSize:12.5,
                      borderLeft:`3px solid ${e.submitted?C.green:C.orange}`}}>
                      {a?a.name:"—"} · {e.submitted?`RPE ${e.rpe}`:t.pending}
                    </span>
                  );})}
              </div>
            </div>
          );})}
      </div>
    </div>
  );
}

function Results({t, lang, athletes, teams, sessions, acwrVisible, setAcwrVisible}) {
  const [teamId,setTeamId] = useState(teams[0]?teams[0].id:"");
  const team = teams.find(x=>x.id===teamId);
  const rows = useMemo(()=>{
    if(!team) return [];
    const ts = sessions.filter(s=>s.teamId===teamId);
    return team.memberIds.map(aid=>{
      const a = athletes.find(x=>x.id===aid);
      const {acute,chronic,acwr,hasData} = acwrFor(ts, aid);
      const recent = ts.filter(s=>s.entries.find(e=>e.athleteId===aid&&e.rpe!==null)).sort((x,y)=>x.dateOffset-y.dateOffset)[0];
      const le = recent && recent.entries.find(e=>e.athleteId===aid);
      const lastLoad = le ? le.rpe*le.minutes : null;
      return {a,acute,chronic,acwr,hasData,lastLoad};
    });
  }, [team, teamId, sessions, athletes]);

  const legend = [[C.blue,t.leg_blue],[C.green,t.leg_green],[C.orange,t.leg_orange],[C.red,t.leg_red]];

  return (
    <div>
      <div style={{display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:16, flexWrap:"wrap", gap:10}}>
        <h2 style={{fontFamily:"Sora", margin:0}}>{t.results_title}</h2>
        <select value={teamId} onChange={(e)=>setTeamId(e.target.value)}
          style={{padding:"10px 14px", borderRadius:12, background:C.panel2, border:`1px solid ${C.line}`, color:C.text, fontSize:14}}>
          {teams.map(tm=><option key={tm.id} value={tm.id}>{tm.name}</option>)}
        </select>
      </div>

      <div style={{display:"grid", gap:12}}>
        {rows.map(r=>{
          const col = acwrColor(r.acwr, r.hasData);
          const val = r.hasData && r.acwr>0 ? r.acwr.toFixed(2).replace(".", lang==="es"?",":".") : t.no_data;
          return (
            <div key={r.a.id} style={{...card, padding:0, overflow:"hidden", borderLeft:`6px solid ${col}`}}>
              {/* fila principal: nombre coloreado + ACWR grande */}
              <div style={{display:"flex", justifyContent:"space-between", alignItems:"center", gap:12, padding:"16px 18px"}}>
                <div style={{minWidth:0}}>
                  <div style={{fontFamily:"Sora", fontWeight:800, fontSize:19, color:col, lineHeight:1.15}}>{r.a.name}</div>
                  <div style={{color:C.sub, fontSize:12.5, marginTop:2}}>{t.bands[bandIndex(r.acwr, r.hasData)]}</div>
                </div>
                <div style={{textAlign:"center", flexShrink:0}}>
                  <div style={{background:col, color:"#fff", fontFamily:"Sora", fontWeight:800, fontSize:26,
                    minWidth:78, padding:"8px 14px", borderRadius:14}}>{val}</div>
                  <div style={{color:C.sub, fontSize:11, marginTop:4, letterSpacing:0.5}}>{t.acwr}</div>
                </div>
              </div>
              {/* detalle: carga / aguda / crónica */}
              <div style={{display:"flex", gap:8, padding:"0 18px 14px", flexWrap:"wrap"}}>
                {[[t.load_col, r.lastLoad??"—"], [t.acute, Math.round(r.acute)], [t.chronic, Math.round(r.chronic)]].map(([lab,v])=>(
                  <div key={lab} style={{flex:"1 1 90px", background:C.panel2, borderRadius:10, padding:"8px 10px"}}>
                    <div style={{color:C.sub, fontSize:11}}>{lab}</div>
                    <div style={{fontWeight:700, fontSize:15, marginTop:2}}>{v}</div>
                  </div>
                ))}
              </div>
              {/* toggle visibilidad */}
              <div style={{display:"flex", justifyContent:"space-between", alignItems:"center",
                padding:"12px 18px", borderTop:`1px solid ${C.line}`}}>
                <span style={{color:C.sub, fontSize:13}}>{t.show_acwr_athlete}</span>
                <Toggle on={!!acwrVisible[r.a.id]} onClick={()=>setAcwrVisible({...acwrVisible, [r.a.id]: !acwrVisible[r.a.id]})}/>
              </div>
            </div>
          );
        })}
      </div>

      <div style={{...card, marginTop:16}}>
        <div style={{color:C.sub, fontWeight:700, fontSize:13, marginBottom:10}}>{t.legend}</div>
        <div style={{display:"grid", gap:8}}>
          {legend.map(([c,label])=>(
            <div key={label} style={{display:"flex", alignItems:"center", gap:10, fontSize:13.5}}>
              <span style={{width:16, height:16, borderRadius:5, background:c}}/><span>{label}</span>
            </div>
          ))}
        </div>
      </div>
    </div>
  );
}

/* ---------------- Atleta ---------------- */
function AthleteApp({t, lang, LangToggle, athletes, teams, sessions, setSessions, acwrVisible, currentAthlete, setCurrentAthlete, onLogout}) {
  const [active,setActive] = useState(null);
  const myTeams = teams.filter(tm=>tm.memberIds.includes(currentAthlete));
  const mySessions = sessions
    .filter(s=>myTeams.some(tm=>tm.id===s.teamId))
    .map(s=>({...s, entry:s.entries.find(e=>e.athleteId===currentAthlete)}))
    .filter(s=>s.entry).sort((a,b)=>a.dateOffset-b.dateOffset);

  const submit = (sid, rpe) => {
    setSessions(sessions.map(s=> s.id!==sid ? s : {...s,
      entries: s.entries.map(e=> e.athleteId===currentAthlete ? {...e, rpe, submitted:true} : e)}));
    setActive(null);
  };

  if(active){ const s=mySessions.find(x=>x.id===active);
    return <RPEScreen t={t} session={s} onSave={(rpe)=>submit(s.id,rpe)} onBack={()=>setActive(null)}/>; }

  const my = acwrFor(sessions.filter(s=>myTeams.some(tm=>tm.id===s.teamId)), currentAthlete);
  const visible = !!acwrVisible[currentAthlete];
  const col = acwrColor(my.acwr, my.hasData);

  return (
    <div>
      <TopBar t={t} LangToggle={LangToggle} onLogout={onLogout}/>
      <div style={{padding:22}}>
        <label style={{display:"block", marginBottom:20}}>
          <span style={{color:C.sub, fontSize:13, fontWeight:600}}>{t.who}</span>
          <select value={currentAthlete} onChange={(e)=>setCurrentAthlete(e.target.value)}
            style={{width:"100%", maxWidth:320, marginTop:6, padding:"12px 14px", borderRadius:12, background:C.panel2, border:`1px solid ${C.line}`, color:C.text, fontSize:15}}>
            {athletes.map(a=><option key={a.id} value={a.id}>{a.name}</option>)}
          </select>
        </label>

        {visible && (
          <div style={{...card, marginBottom:20, display:"flex", justifyContent:"space-between", alignItems:"center"}}>
            <div>
              <div style={{color:C.sub, fontSize:13, fontWeight:600}}>{t.your_acwr}</div>
              <div style={{fontSize:13, color:col, fontWeight:700, marginTop:4}}>{t.bands[bandIndex(my.acwr,my.hasData)]}</div>
            </div>
            <span style={{background:col, color:"#fff", fontWeight:800, fontSize:22, padding:"10px 18px", borderRadius:14}}>
              {my.hasData&&my.acwr>0 ? my.acwr.toFixed(2).replace(".", lang==="es"?",":".") : "—"}
            </span>
          </div>
        )}

        <h2 style={{fontFamily:"Sora"}}>{t.your_sessions}</h2>
        <div style={{display:"grid", gap:12}}>
          {mySessions.map(s=>{ const tm=teams.find(x=>x.id===s.teamId);
            return (
              <div key={s.id} style={{...card, display:"flex", justifyContent:"space-between", alignItems:"center", gap:12}}>
                <div>
                  <div style={{fontWeight:700}}>{tm?tm.name:"—"}</div>
                  <div style={{color:C.sub, fontSize:13}}>{fmtDate(dateFromOffset(s.dateOffset), lang)} · {s.entry.minutes} {t.minutes_label}</div>
                </div>
                {s.entry.submitted
                  ? <span style={{color:C.green, fontWeight:700, fontSize:14}}>✓ {t.done} (RPE {s.entry.rpe})</span>
                  : <button onClick={()=>setActive(s.id)} style={btn(C.brand)}>{t.complete_survey}</button>}
              </div>
            );})}
        </div>
      </div>
    </div>
  );
}

/* ---------------- Pantalla RPE ---------------- */
function RPEScreen({t, session, onSave, onBack}) {
  const [v,setV] = useState(5);
  const pct = (v/10)*100;
  const trackBg = `linear-gradient(90deg, ${C.fill} 0%, ${C.fill} ${pct}%, ${C.panel2} ${pct}%, ${C.panel2} 100%)`;
  return (
    <div style={{padding:"20px 24px 40px", minHeight:"100vh", display:"flex", flexDirection:"column"}}>
      <button onClick={onBack} style={{background:"none", border:"none", color:C.text, fontSize:26, cursor:"pointer", alignSelf:"flex-start"}}>←</button>
      <div style={{textAlign:"center", marginTop:30}}>
        <h1 style={{fontFamily:"Sora", fontWeight:800, fontSize:30, lineHeight:1.15, margin:"0 auto", maxWidth:420}}>{t.rpe_question}</h1>
        <p style={{color:C.sub, fontWeight:700, fontSize:18, marginTop:18, minHeight:28}}>{t.rpe[v]}</p>
      </div>
      <div style={{flex:1, display:"flex", alignItems:"center", justifyContent:"center"}}>
        <div style={{width:130, height:130, borderRadius:"50%", background:C.panel2, display:"flex",
          alignItems:"center", justifyContent:"center", fontFamily:"Sora", fontWeight:800, fontSize:54}}>{v}</div>
      </div>
      <div style={{margin:"0 0 28px"}}>
        <input className="cg-range" type="range" min={0} max={10} step={1}
          value={v} onChange={(e)=>setV(parseInt(e.target.value))} style={{background:trackBg}}/>
        <div style={{display:"flex", justifyContent:"space-between", color:C.gray, fontSize:12, marginTop:8, padding:"0 4px"}}>
          <span>0</span><span>5</span><span>10</span>
        </div>
      </div>
      <button onClick={()=>onSave(v)} style={btn(C.brandBright,{width:"100%", padding:"16px", fontSize:17, borderRadius:16})}>{t.save}</button>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
